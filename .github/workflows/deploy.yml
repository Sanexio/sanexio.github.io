name: Build and deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions for the deploy step (push to gh-pages branch).
permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Build (Astro)
        run: bun run build

      - name: Add .nojekyll
        # Tells GitHub Pages to skip Jekyll processing — required because
        # Astro emits files with leading underscores (e.g. _astro/) that
        # Jekyll would silently drop.
        run: touch dist/.nojekyll

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'deploy: ${{ github.event.head_commit.message }}'
