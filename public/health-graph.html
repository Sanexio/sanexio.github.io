#legend{position:absolute;bottom:20px;right:20px;z-index:100;display:flex;gap:16px;align-items:center;font-size:11px;color:#8899AA}
.legend-item{display:flex;align-items:center;gap:5px}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.legend-diamond{width:8px;height:8px;transform:rotate(45deg);flex-shrink:0;border-radius:1px}

#node-count{display:none}

#error-log{position:fixed;bottom:0;left:0;right:0;background:#E63946;color:white;padding:8px 16px;font-size:12px;display:none;z-index:9999}

<div id="tooltip"></div>
<div id="node-count"></div>

Serotonin-Metabolit im Urin, spezifischer Marker für Karzinoid"}, {"id": "catecholamines_urine", "label": "Katecholamine im 24h-Urin", "unit": "µg/24h", "normalRange": "Adrenalin < 20 / Noradrenalin < 80 / Dopamin < 400", "category": "Hormone & Endokrinologie", "significance": "Ergänzt Metanephrine bei V.a. Phäochromozytom"}, {"id": "vip", "label": "VIP (Vasoaktives intestinales Peptid)", "unit": "pmol/L", "normalRange": "< 30", "category": "Hormone & Endokrinologie", "significance": "Erhöht beim VIPom (Verner-Morrison-Syndrom), wässrige Diarrhoe"}, {"id": "glucagon", "label": "Glukagon", "unit": "pg/mL", "normalRange": "50–150", "category": "Hormone & Endokrinologie", "significance": "Gegenspieler des Insulins, erhöht beim Glukagonom"}, {"id": "oh17_progesterone", "label": "17-OH-Progesteron", "unit": "ng/mL", "normalRange": "F follikulär: 0.2–1.0 / M: 0.5–2.5", "category": "Hormone & Endokrinologie", "significance": "Screeningparameter für Adrenogenitales Syndrom (21-Hydroxylase-Mangel)"}, {"id": "cea", "label": "CEA (Carcinoembryonales Antigen)", "unit": "ng/mL", "normalRange": "< 5.0 (Nichtraucher) / < 10.0 (Raucher)", "category": "Tumormarker", "significance": "Wichtigster Verlaufsmarker bei kolorektalem Karzinom, auch bei Mamma-, Lungen-, Pankreaskarzinom"}, {"id": "ca199", "label": "CA 19-9", "unit": "U/mL", "normalRange": "< 37", "category": "Tumormarker", "significance": "Leitmarker beim Pankreaskarzinom, auch bei Gallenwegskarzinom"}, {"id": "ca125", "label": "CA 125", "unit": "U/mL", "normalRange": "< 35", "category": "Tumormarker", "significance": "Leitmarker beim Ovarialkarzinom, auch erhöht bei Endometriose und Aszites"}, {"id": "ca153", "label": "CA 15-3", "unit": "U/mL", "normalRange": "< 31", "category": "Tumormarker", "significance": "Verlaufsmarker beim metastasierten Mammakarzinom"}, {"id": "afp", "label": "AFP (Alpha-Fetoprotein)", "unit": "ng/mL", "normalRange": "< 7", "category": "Tumormarker", "significance": "Marker für HCC und Keimzelltumoren, auch erhöht bei Leberzirrhose"}, {"id": "beta_hcg", "label": "Beta-HCG (humanes Choriongonadotropin)", "unit": "mIU/mL", "normalRange": "< 5 (nicht-schwanger)", "category": "Tumormarker", "significance": "Marker für Keimzelltumoren und Trophoblasttumoren, auch Schwangerschaftsnachweis"}, {"id": "nse", "label": "NSE (Neuronenspezifische Enolase)", "unit": "ng/mL", "normalRange": "< 16.3", "category": "Tumormarker", "significance": "Marker für SCLC und neuroendokrine Tumoren, auch bei Neuroblastom"}, {"id": "cyfra211", "label": "CYFRA 21-1 (Zytokeratin-19-Fragment)", "unit": "ng/mL", "normalRange": "< 3.3", "category": "Tumormarker", "significance": "Leitmarker beim NSCLC (Plattenepithelkarzinom), auch bei Blasenkarzinom"}, {"id": "scc", "label": "SCC (Squamous Cell Carcinoma Antigen)", "unit": "ng/mL", "normalRange": "< 1.5", "category": "Tumormarker", "significance": "Marker für Plattenepithelkarzinome (Zervix, Lunge, Ösophagus, HNO)"}, {"id": "chromogranin_a", "label": "Chromogranin A", "unit": "ng/mL", "normalRange": "< 100", "category": "Tumormarker", "significance": "Universalmarker für neuroendokrine Tumoren, auch bei Phäochromozytom"}, {"id": "s100", "label": "S100 (S100B-Protein)", "unit": "µg/L", "normalRange": "< 0.10", "category": "Tumormarker", "significance": "Verlaufsmarker beim malignen Melanom, auch bei SHT erhöht"}, {"id": "thyreoglobulin", "label": "Thyreoglobulin (Tg)", "unit": "ng/mL", "normalRange": "< 35 (mit Schilddrüse) / < 1 (nach Thyreoidektomie)", "category": "Tumormarker", "significance": "Nachsorgemarker beim differenzierten Schilddrüsenkarzinom nach Thyreoidektomie"}, {"id": "calcitonin", "label": "Calcitonin", "unit": "pg/mL", "normalRange": "M: < 11.5 / F: < 4.6", "category": "Tumormarker", "significance": "Marker für medulläres Schilddrüsenkarzinom (C-Zell-Karzinom)"}, {"id": "protein_electrophoresis", "label": "Serumprotein-Elektrophorese (M-Gradient)", "unit": "g/dL", "normalRange": "kein M-Gradient nachweisbar", "category": "Tumormarker", "significance": "Nachweis monoklonaler Gammopathie (M-Gradient) bei Multiplem Myelom"}, {"id": "bence_jones", "label": "Bence-Jones-Protein (freie Leichtketten, Urin)", "unit": "mg/L", "normalRange": "negativ", "category": "Tumormarker", "significance": "Freie Leichtketten im Urin bei Multiplem Myelom und AL-Amyloidose"}, {"id": "che", "label": "Cholinesterase (CHE)", "unit": "kU/L", "normalRange": "M: 5.3–12.9 / F: 4.3–11.3", "category": "Leber & Hepatologie", "significance": "Marker der Lebersyntheseleistung, erniedrigt bei Zirrhose und Leberinsuffizienz"}, {"id": "gldh", "label": "GLDH (Glutamatdehydrogenase)", "unit": "U/L", "normalRange": "M: < 7.0 / F: < 5.0", "category": "Leber & Hepatologie", "significance": "Mitochondrialer Marker für schwere Leberzellnekrose (zentrolobulär)"}, {"id": "ammonia", "label": "Ammoniak (NH₃)", "unit": "µmol/L", "normalRange": "10–47", "category": "Leber & Hepatologie", "significance": "Erhöht bei hepatischer Enzephalopathie und Leberversagen"}, {"id": "ceruloplasmin", "label": "Coeruloplasmin", "unit": "mg/dL", "normalRange": "20–60", "category": "Leber & Hepatologie", "significance": "Kupfer-Transportprotein, erniedrigt bei Morbus Wilson"}, {"id": "copper_serum", "label": "Kupfer (Serum)", "unit": "µg/dL", "normalRange": "70–140", "category": "Leber & Hepatologie", "significance": "Erniedrigt (Gesamtkupfer) bei Wilson, freies Kupfer erhöht"}, {"id": "alpha1_antitrypsin", "label": "Alpha-1-Antitrypsin (AAT)", "unit": "mg/dL", "normalRange": "90–200", "category": "Leber & Hepatologie", "significance": "Protease-Inhibitor, Mangel führt zu Lungenemphysem und Leberzirrhose"}, {"id": "bilirubin_direct", "label": "Bilirubin direkt (konjugiert)", "unit": "mg/dL", "normalRange": "< 0.3", "category": "Leber & Hepatologie", "significance": "Erhöht bei Cholestase, hepatozellulärer Schädigung, Dubin-Johnson-Syndrom"}, {"id": "bilirubin_indirect", "label": "Bilirubin indirekt (unkonjugiert)", "unit": "mg/dL", "normalRange": "< 0.8", "category": "Leber & Hepatologie", "significance": "Erhöht bei Hämolyse, Gilbert-Syndrom, ineffektiver Erythropoese"}, {"id": "haptoglobin", "label": "Haptoglobin", "unit": "mg/dL", "normalRange": "30–200", "category": "Leber & Hepatologie", "significance": "Erniedrigt bei Hämolyse (bindet freies Hämoglobin), Akute-Phase-Protein"}, {"id": "cystatin_c", "label": "Cystatin C", "unit": "mg/L", "normalRange": "0.53–0.95", "category": "Niere & Urologie", "significance": "GFR-Marker unabhängig von Muskelmasse, besser als Kreatinin bei Älteren/Kachektischen"}, {"id": "uacr", "label": "Albumin-Kreatinin-Ratio (UACR, Urin)", "unit": "mg/g Krea", "normalRange": "< 30", "category": "Niere & Urologie", "significance": "Frühmarker für Nierenschaden, Mikroalbuminurie 30–300, Makroalbuminurie > 300"}, {"id": "urine_sediment", "label": "Urin-Sediment (qualitativ)", "unit": "qualitativ", "normalRange": "keine pathologischen Zylinder, < 5 Erys/Leuks pro HPF", "category": "Niere & Urologie", "significance": "Erythrozytenzylinder → GN, Leukozytenzylinder → Pyelonephritis, Wachszylinder → CKD"}, {"id": "urine_dipstick", "label": "Urin-Status (Stix/Teststreifen)", "unit": "qualitativ/semiquantitativ", "normalRange": "Protein neg, Blut neg, Leukozyten neg, Nitrit neg, Glukose neg", "category": "Niere & Urologie", "significance": "Schnell-Screening auf Proteinurie, Hämaturie, HWI, Glukosurie"}, {"id": "beta2_microglobulin", "label": "Beta-2-Mikroglobulin", "unit": "mg/L", "normalRange": "< 2.5 (Serum)", "category": "Niere & Urologie", "significance": "Tubulärer Marker, prognostisch bei Myelom, erhöht bei Niereninsuffizienz"}, {"id": "osmolality", "label": "Osmolalität (Serum/Urin)", "unit": "mOsm/kg", "normalRange": "Serum: 280–300 / Urin: 300–900", "category": "Niere & Urologie", "significance": "Serum-/Urinosmolalität zur DD von Hyponatriämie, DI vs. SIADH"}, {"id": "creatinine_clearance", "label": "Kreatinin-Clearance (Sammelurin)", "unit": "mL/min", "normalRange": "M: 95–145 / F: 75–115", "category": "Niere & Urologie", "significance": "Direkte GFR-Messung über 24h-Sammelurin, genauer als eGFR bei Extremwerten"}, {"id": "urine_sodium", "label": "Natrium im Urin", "unit": "mmol/L", "normalRange": "40–220 mmol/24h", "category": "Niere & Urologie", "significance": "DD Hyponatriämie: < 20 → prärenal, > 40 → renal/SIADH"}, {"id": "vita", "label": "Vitamin A (Retinol)", "unit": "mg/L", "normalRange": "0.3–0.7", "category": "Vitamine & Spurenelemente", "significance": "Sehfunktion, Immunsystem, Zellwachstum; Mangel → Nachtblindheit, Xerophthalmie"}, {"id": "vite", "label": "Vitamin E (alpha-Tocopherol)", "unit": "mg/L", "normalRange": "5–20", "category": "Vitamine & Spurenelemente", "significance": "Wichtigstes lipophiles Antioxidans, Mangel → Neuropathie, Hämolyse"}, {"id": "vitk", "label": "Vitamin K", "unit": "ng/mL", "normalRange": "0.1–2.2", "category": "Vitamine & Spurenelemente", "significance": "Essentiell für Gerinnungsfaktoren (II, VII, IX, X) und Osteocalcin"}, {"id": "vitb1", "label": "Vitamin B1 (Thiamin)", "unit": "µg/L", "normalRange": "28–85", "category": "Vitamine & Spurenelemente", "significance": "Coenzym im Energiestoffwechsel, Mangel → Beriberi, Wernicke-Enzephalopathie"}, {"id": "vitb6", "label": "Vitamin B6 (Pyridoxin)", "unit": "µg/L", "normalRange": "5–30", "category": "Vitamine & Spurenelemente", "significance": "Coenzym im Aminosäurestoffwechsel, Mangel → periphere Neuropathie"}, {"id": "zinc", "label": "Zink (Serum)", "unit": "µg/dL", "normalRange": "70–120", "category": "Vitamine & Spurenelemente", "significance": "Essentiell für >300 Enzyme, Immunfunktion, Wundheilung"}, {"id": "selenium", "label": "Selen (Serum)", "unit": "µg/L", "normalRange": "50–120", "category": "Vitamine & Spurenelemente", "significance": "Bestandteil von Selenoproteinen (Glutathionperoxidase), Schilddrüsenfunktion"}, {"id": "manganese", "label": "Mangan (Serum)", "unit": "µg/L", "normalRange": "4–15", "category": "Vitamine & Spurenelemente", "significance": "Cofaktor für Superoxiddismutase und Knochenbildung"}, {"id": "magnesium", "label": "Magnesium (Serum)", "unit": "mmol/L", "normalRange": "0.75–1.05", "category": "Vitamine & Spurenelemente", "significance": "Elektrolyt, Enzymkofaktor, neuromuskuläre Erregbarkeit"}, {"id": "chloride", "label": "Chlorid (Serum)", "unit": "mmol/L", "normalRange": "96–106", "category": "Vitamine & Spurenelemente", "significance": "Wichtigstes extrazelluläres Anion, relevant für Säure-Base-Haushalt"}, {"id": "bicarbonate", "label": "Bicarbonat (HCO₃⁻)", "unit": "mmol/L", "normalRange": "22–26", "category": "Vitamine & Spurenelemente", "significance": "Wichtigstes Puffersystem im Blut, erniedrigt bei metabolischer Azidose"}, {"id": "vitc", "label": "Vitamin C (Ascorbinsäure)", "unit": "mg/L", "normalRange": "5–15", "category": "Vitamine & Spurenelemente", "significance": "Antioxidans, Kollagensynthese, Eisenresorption; Mangel → Skorbut"}, {"id": "vitb3", "label": "Vitamin B3 (Niacin/Nicotinamid)", "unit": "µg/L", "normalRange": "5–30", "category": "Vitamine & Spurenelemente", "significance": "NAD/NADP-Vorstufe, Energiestoffwechsel; Mangel → Pellagra (3D: Dermatitis, Diarrhoe, Demenz)"}, {"id": "coenzyme_q10", "label": "Coenzym Q10 (Ubiquinon)", "unit": "mg/L", "normalRange": "0.5–1.5", "category": "Vitamine & Spurenelemente", "significance": "Mitochondriale Atmungskette, Antioxidans; erniedrigt unter Statintherapie"}, {"id": "omega3_index", "label": "Omega-3-Index", "unit": "%", "normalRange": "8–11 (optimal)", "category": "Vitamine & Spurenelemente", "significance": "EPA+DHA in Erythrozytenmembran, kardiovaskulärer Risikofaktor"}, {"id": "ph_arterial", "label": "pH (arteriell)", "unit": "pH", "normalRange": "7.35–7.45", "category": "BGA & Säure-Base", "significance": "Zentraler Parameter des Säure-Base-Haushalts, Abweichung → Azidose/Alkalose"}, {"id": "base_excess", "label": "Base Excess (BE)", "unit": "mmol/L", "normalRange": "-2 bis +2", "category": "BGA & Säure-Base", "significance": "Metabolische Komponente der BGA, negativ bei metabolischer Azidose"}, {"id": "sao2", "label": "SaO₂ (arterielle Sauerstoffsättigung)", "unit": "%", "normalRange": "95–99", "category": "BGA & Säure-Base", "significance": "Anteil des oxygenierten Hämoglobins, erniedrigt bei Hypoxämie"}, {"id": "anion_gap", "label": "Anionenlücke", "unit": "mmol/L", "normalRange": "8–16", "category": "BGA & Säure-Base", "significance": "Na - (Cl + HCO3), erhöht bei Laktatazidose, Ketoazidose, Intoxikationen"}, {"id": "methemoglobin", "label": "Methämoglobin (Met-Hb)", "unit": "%", "normalRange": "< 1.5", "category": "BGA & Säure-Base", "significance": "Oxidiertes Hämoglobin, kann keinen O₂ transportieren; erhöht bei Intoxikationen"}, {"id": "cohb", "label": "Carboxyhämoglobin (CO-Hb)", "unit": "%", "normalRange": "< 2 (Nichtraucher) / < 5 (Raucher)", "category": "BGA & Säure-Base", "significance": "CO-gebundenes Hämoglobin, erhöht bei Kohlenmonoxid-Vergiftung"}, {"id": "ige_total", "label": "Gesamt-IgE", "unit": "IU/mL", "normalRange": "< 100", "category": "Allergie & Immunologie", "significance": "Screening für atopische Erkrankungen, parasitäre Infektionen, Mastozytose"}, {"id": "ige_specific", "label": "Spezifisches IgE (RAST/CAP)", "unit": "kU/L (CAP-Klassen 0–6)", "normalRange": "< 0.35 kU/L (Klasse 0)", "category": "Allergie & Immunologie", "significance": "Nachweis sensibilisierungsrelevanter Allergene (Pollen, Milben, Nahrungsmittel)"}, {"id": "igg", "label": "IgG (Immunglobulin G)", "unit": "mg/dL", "normalRange": "700–1600", "category": "Allergie & Immunologie", "significance": "Hauptimmunglobulin im Serum (~75%), erniedrigt bei CVID, erhöht bei chron. Infektion"}, {"id": "iga", "label": "IgA (Immunglobulin A)", "unit": "mg/dL", "normalRange": "70–400", "category": "Allergie & Immunologie", "significance": "Schleimhautimmunität, häufigster Antikörpermangel (selektiver IgA-Mangel 1:500)"}, {"id": "igm", "label": "IgM (Immunglobulin M)", "unit": "mg/dL", "normalRange": "40–230", "category": "Allergie & Immunologie", "significance": "Erstantwort bei Infektionen (Primärreaktion), erhöht bei Waldenström"}, {"id": "tryptase", "label": "Tryptase (Serum)", "unit": "µg/L", "normalRange": "< 11.4", "category": "Allergie & Immunologie", "significance": "Mastzelldegranulationsmarker, erhöht bei Anaphylaxie und Mastozytose"}, {"id": "ecp", "label": "ECP (Eosinophiles kationisches Protein)", "unit": "µg/L", "normalRange": "< 24", "category": "Allergie & Immunologie", "significance": "Marker der eosinophilen Aktivierung, Verlaufsparameter bei Asthma"}, {"id": "hbsag", "label": "HBsAg (Hepatitis-B-Surface-Antigen)", "unit": "qualitativ", "normalRange": "negativ", "category": "Infektiologie Serologie", "significance": "Nachweis einer aktiven HBV-Infektion (akut oder chronisch)"}, {"id": "anti_hbs", "label": "Anti-HBs", "unit": "mIU/mL", "normalRange": "> 10 (Immunschutz)", "category": "Infektiologie Serologie", "significance": "Zeigt Immunität nach Impfung oder ausgeheilter Hepatitis B"}, {"id": "anti_hbc", "label": "Anti-HBc (IgM/IgG)", "unit": "qualitativ", "normalRange": "negativ", "category": "Infektiologie Serologie", "significance": "Durchseuchungsmarker, IgM bei akuter, IgG bei ausgeheilter/chronischer Hep B"}, {"id": "anti_hcv", "label": "Anti-HCV", "unit": "qualitativ", "normalRange": "negativ", "category": "Infektiologie Serologie", "significance": "Screening auf Hepatitis-C-Exposition (Antikörper persistieren auch nach Heilung)"}, {"id": "hcv_rna", "label": "HCV-RNA (PCR, quantitativ)", "unit": "IU/mL", "normalRange": "nicht nachweisbar", "category": "Infektiologie Serologie", "significance": "Nachweis aktiver HCV-Replikation, Therapiemonitoring (SVR)"}, {"id": "hiv_combo", "label": "HIV 1/2 AK/Ag Combo-Test (4. Gen.)", "unit": "qualitativ", "normalRange": "negativ/nicht reaktiv", "category": "Infektiologie Serologie", "significance": "Screening auf HIV-Infektion, detektiert p24-Antigen + AK ab ~2 Wochen"}, {"id": "lues_screening", "label": "Lues-Serologie (TPHA/TPPA + RPR/VDRL)", "unit": "qualitativ", "normalRange": "negativ", "category": "Infektiologie Serologie", "significance": "Zweistufentest: TPHA als Screening, RPR/VDRL als Aktivitätsmarker"}, {"id": "borrelia_ab", "label": "Borrelien-Antikörper (IgM/IgG)", "unit": "qualitativ", "normalRange": "negativ", "category": "Infektiologie Serologie", "significance": "Stufendiagnostik (ELISA + Immunoblot), IgM ab 3 Wochen nach Zeckenstich"}, {"id": "fsme_ab", "label": "FSME-Antikörper (IgM/IgG)", "unit": "qualitativ", "normalRange": "negativ (oder positiv nach Impfung)", "category": "Infektiologie Serologie", "significance": "Nachweis FSME-Infektion oder Impftiter"}, {"id": "ebv_panel", "label": "EBV-Panel (VCA-IgM, VCA-IgG, EBNA-IgG)", "unit": "qualitativ", "normalRange": "negativ (nie infiziert) oder VCA-IgG+/EBNA+ (Durchseuchung)", "category": "Infektiologie Serologie", "significance": "Differenzierung akut (VCA-IgM+) vs. abgelaufen (EBNA+) EBV-Infektion"}, {"id": "cmv_ab", "label": "CMV-Antikörper (IgM/IgG)", "unit": "qualitativ", "normalRange": "IgM negativ / IgG variabel", "category": "Infektiologie Serologie", "significance": "CMV-Serostatus, IgM bei Primärinfektion oder Reaktivierung"}, {"id": "quantiferon", "label": "Quantiferon / IGRA (Interferon-γ Release Assay)", "unit": "IU/mL", "normalRange": "< 0.35 (negativ)", "category": "Infektiologie Serologie", "significance": "Nachweis latenter TB-Infektion, nicht beeinflusst durch BCG-Impfung"}, {"id": "sars_cov2", "label": "SARS-CoV-2 (PCR/Antigen)", "unit": "qualitativ", "normalRange": "negativ", "category": "Infektiologie Serologie", "significance": "Nachweis aktiver SARS-CoV-2-Infektion, PCR Goldstandard"}, {"id": "influenza_pcr", "label": "Influenza A/B (PCR/Schnelltest)", "unit": "qualitativ", "normalRange": "negativ", "category": "Infektiologie Serologie", "significance": "Nachweis aktiver Influenza-Infektion, therapierelevant (Oseltamivir)"}, {"id": "rsv_ag", "label": "RSV-Antigen/PCR", "unit": "qualitativ", "normalRange": "negativ", "category": "Infektiologie Serologie", "significance": "Nachweis RSV-Infektion, relevant bei Kindern und Älteren"}, {"id": "hpv_typing", "label": "HPV-Typisierung (High-Risk)", "unit": "qualitativ", "normalRange": "negativ", "category": "Infektiologie Serologie", "significance": "Nachweis onkogener HPV-Typen (16, 18), Zervixkarzinom-Screening"}, {"id": "toxoplasma_ab", "label": "Toxoplasmose-Antikörper (IgM/IgG)", "unit": "qualitativ", "normalRange": "IgM negativ", "category": "Infektiologie Serologie", "significance": "Serostatus in Schwangerschaft und bei Immunsuppression relevant"}, {"id": "vzv_ab", "label": "Varizella-Zoster-Antikörper (IgG)", "unit": "mIU/mL", "normalRange": "> 100 (Immunschutz)", "category": "Infektiologie Serologie", "significance": "Impftiter-Kontrolle, Serostatus vor Immunsuppression"}, {"id": "measles_rubella_ab", "label": "Masern/Röteln-Antikörper (IgG)", "unit": "qualitativ", "normalRange": "positiv (nach Impfung/Infektion)", "category": "Infektiologie Serologie", "significance": "Impftiter-Kontrolle (Masernschutzgesetz), Röteln-Immunität in Schwangerschaft"}, {"id": "tpo_ab", "label": "TPO-Antikörper (Anti-Thyreoperoxidase)", "unit": "IU/mL", "normalRange": "< 34", "category": "Schilddrüse & Nebenschilddrüse", "significance": "Marker für autoimmune Thyreoiditis (Hashimoto), bei >90% der Hashimoto-Patienten positiv"}, {"id": "trak", "label": "TRAK (TSH-Rezeptor-Antikörper)", "unit": "IU/L", "normalRange": "< 1.75", "category": "Schilddrüse & Nebenschilddrüse", "significance": "Stimulierende AK beim Morbus Basedow, nahezu pathognomonisch (>95%)"}, {"id": "calcium_ionized", "label": "Calcium ionisiert (frei)", "unit": "mmol/L", "normalRange": "1.15–1.30", "category": "Schilddrüse & Nebenschilddrüse", "significance": "Biologisch aktive Calciumfraktion, unabhängig von Albumin"}, {"id": "calcitriol", "label": "1,25-Dihydroxy-Vitamin-D (Calcitriol)", "unit": "pg/mL", "normalRange": "20–60", "category": "Schilddrüse & Nebenschilddrüse", "significance": "Aktive Form von Vitamin D, PTH-gesteuert in der Niere synthetisiert"}, {"id": "tg_ab", "label": "Thyreoglobulin-Antikörper (TG-AK)", "unit": "IU/mL", "normalRange": "< 115", "category": "Schilddrüse & Nebenschilddrüse", "significance": "Interferieren mit Thyreoglobulin-Messung, relevant bei SD-Karzinom-Nachsorge"}, {"id": "lpa", "label": "Lipoprotein(a) [Lp(a)]", "unit": "nmol/L", "normalRange": "< 75 (< 30 mg/dL)", "category": "Kardiovaskuläre Risikofaktoren", "significance": "Genetisch determinierter KHK-Risikofaktor, nicht durch Lebensstil beeinflussbar"}, {"id": "apob", "label": "Apolipoprotein B (ApoB)", "unit": "mg/dL", "normalRange": "< 130 (< 80 bei hohem Risiko)", "category": "Kardiovaskuläre Risikofaktoren", "significance": "Repräsentiert alle atherogenen Partikel (LDL, VLDL, Lp(a)), besser als LDL allein"}, {"id": "apoa1", "label": "Apolipoprotein A1 (ApoA1)", "unit": "mg/dL", "normalRange": "M: 110–205 / F: 120–220", "category": "Kardiovaskuläre Risikofaktoren", "significance": "Hauptprotein des HDL, antiatherogen, ApoB/ApoA1-Ratio als Risikomarker"}, {"id": "homocysteine", "label": "Homocystein", "unit": "µmol/L", "normalRange": "5–15", "category": "Kardiovaskuläre Risikofaktoren", "significance": "Unabhängiger kardiovaskulärer Risikofaktor, erhöht bei B12/Folsäuremangel"}, {"id": "hscrp", "label": "hs-CRP (hochsensitives CRP)", "unit": "mg/L", "normalRange": "< 1 (niedrig) / 1–3 (mittel) / > 3 (hoch)", "category": "Kardiovaskuläre Risikofaktoren", "significance": "Kardiovaskuläres Risiko-Screening im Niedrigbereich (anders als CRP für Infektion)"}, {"id": "nt_probnp", "label": "NT-proBNP", "unit": "pg/mL", "normalRange": "< 125 (< 75 J.) / < 450 (> 75 J.)", "category": "Kardiovaskuläre Risikofaktoren", "significance": "Inaktives Fragment bei BNP-Spaltung, längere HWZ als BNP, Herzinsuffizienz-Marker"}, {"id": "galectin3", "label": "Galectin-3", "unit": "ng/mL", "normalRange": "< 17.8", function getSeverityColor(severity) {
  var s = (severity || '').toLowerCase();
  if (s.indexOf('lebensbedrohlich') !== -1) return '#E63946';
  if (s.indexOf('schwer') !== -1) return '#FF6B35';
  if (s.indexOf('mittel') !== -1) return '#FFB400';
  if (s.indexOf('leicht') !== -1) return '#7DCE82';
  return '#A8A8A8';
}

var nodeMap = {};
var nodes = [];
var links = [];

// Organs
DATA.organs.forEach(function(o) {
  var n = {id: o.id, label: o.label, type: 'organ', r: 28, color: o.color, system: o.system, description: o.description};
  nodes.push(n);
  nodeMap[o.id] = n;
});

// Lab values
DATA.labvalues.forEach(function(l) {
  var n = {id: l.id, label: l.label, type: 'labvalue', r: 10, color: '#028090', unit: l.unit, normalRange: l.normalRange, category: l.category, significance: l.significance};
  nodes.push(n);
  nodeMap[l.id] = n;
});

// Diseases
DATA.diseases.forEach(function(d) {
  var n = {id: d.id, label: d.label, type: 'disease', r: 12, color: getSeverityColor(d.severity), severity: d.severity, icd10: d.icd10, category: d.category};
  nodes.push(n);
  nodeMap[d.id] = n;
});

// Edges
DATA.edges.forEach(function(e) {
  if (nodeMap[e.from] && nodeMap[e.to]) {
    links.push({source: e.from, target: e.to, type: e.type, detail: e.detail || ''});
  }
});

// Adjacency map for neighbor lookup
var adjacency = {};
nodes.forEach(function(n) { adjacency[n.id] = new Set(); });
links.forEach(function(l) {
  var sid = typeof l.source === 'object' ? l.source.id : l.source;
  var tid = typeof l.target === 'object' ? l.target.id : l.target;
  adjacency[sid].add(tid);
  adjacency[tid].add(sid);
});

// Node count display
document.getElementById('node-count').textContent = nodes.length + ' Knoten, ' + links.length + ' Verbindungen';

var W = Math.max(document.documentElement.clientWidth || 1200, 1200);
var H = Math.max(document.documentElement.clientHeight || 800, 800);

var svg = d3.select('#graph')
  .attr('viewBox', '0 0 ' + W + ' ' + H)
  .attr('preserveAspectRatio', 'xMidYMid meet')
  .style('width', '100%')
  .style('height', '100vh');

defs.append('marker').attr('id','arrow-ol').attr('viewBox','0 0 10 6').attr('refX',10).attr('refY',3)

defs.append('marker').attr('id','arrow-ld').attr('viewBox','0 0 10 6').attr('refX',10).attr('refY',3)

defs.append('marker').attr('id','arrow-do').attr('viewBox','0 0 10 6').attr('refX',10).attr('refY',3)

  .append('path').attr('d','M0,0 L10,3 L0,6 Z').attr('fill','#E63946');

// Container group
var g = svg.append('g');

// Zoom behavior
var zoom = d3.zoom()
  .scaleExtent([0.1, 5])
  .on('zoom', function(event) {
    g.attr('transform', event.transform);
    currentScale = event.transform.k;
    // Zoom-dependent label visibility (nodeEls/linkEls may not exist yet during init)
    if (typeof nodeEls !== 'undefined') {
      nodeEls.selectAll('text').attr('display', function(d) {
        if (d.type === 'organ') return 'block';
        return currentScale > 0.6 ? 'block' : 'none';
      });
    }
    if (typeof linkEls !== 'undefined') {
      linkEls.attr('stroke-opacity', function() {
        return currentScale > 0.4 ? 0.5 : 0.2;
      });
    }
  });

svg.call(zoom);

// Set initial transform centered (will be overridden by fitGraph)
var currentScale = 0.7;
svg.call(zoom.transform, d3.zoomIdentity.translate(Math.round(W / 2), Math.round(H / 2)).scale(currentScale));

// Auto-fit: zoom so the entire graph fills the screen
function fitGraph() {
  if (!nodes.length) return;
  var pad = 60;
  var xMin = Infinity, xMax = -Infinity, yMin = Infinity, yMax = -Infinity;
  nodes.forEach(function(n) {
    if (n.x == null) return;
    var r = n.r || 10;
    if (n.x - r < xMin) xMin = n.x - r;
    if (n.x + r > xMax) xMax = n.x + r;
    if (n.y - r < yMin) yMin = n.y - r;
    if (n.y + r > yMax) yMax = n.y + r;
  });
  if (!isFinite(xMin)) return;
  var gw = xMax - xMin + pad * 2;
  var gh = yMax - yMin + pad * 2;
  var cx = (xMin + xMax) / 2;
  var cy = (yMin + yMax) / 2;
  var scale = Math.min(W / gw, H / gh, 2);
  currentScale = scale;
  svg.transition().duration(800).call(
    zoom.transform,
    d3.zoomIdentity.translate(W / 2 - cx * scale, H / 2 - cy * scale).scale(scale)
  );
}

function edgeStyle(type) {
  if (type === 'organ_produces_lab') return {stroke: '#028090', dash: 'none', marker: 'url(#arrow-ol)'};
  if (type === 'lab_indicates_disease') return {stroke: '#FF8C42', dash: '6,4', marker: 'url(#arrow-ld)'};
  return {stroke: '#E63946', dash: '2,4', marker: 'url(#arrow-do)'};
}

var linkEls = linkGroup.selectAll('line')

    d3.select(this)

      .attr('marker-end', s.marker);
  });

// Draw shape per type
nodeEls.each(function(d) {
  var el = d3.select(this);
  if (d.type === 'disease') {
    var s = d.r;
    el.append('rect')
      .attr('width', s * 1.4)
      .attr('height', s * 1.4)
      .attr('x', -s * 0.7)
      .attr('y', -s * 0.7)
      .attr('rx', 3)
      .attr('transform', 'rotate(45)')
      .attr('fill', d.color)
      .attr('fill-opacity', 1)
      .attr('stroke', d.color)
      .attr('stroke-width', 1.5)
      .attr('stroke-opacity', 0.5);
  } else if (d.type === 'organ' && organIconPaths[d.id]) {
    // Organ: colored circle background + white icon
    el.append('circle')
      .attr('r', d.r)
      .attr('fill', d.color)
      .attr('fill-opacity', 0.9)
      .attr('stroke', d.color)
      .attr('stroke-width', 2.5)
      .attr('stroke-opacity', 0.4);
    var iconScale = (d.r * 2) / 48;
    el.append('path')
      .attr('d', organIconPaths[d.id])
      .attr('fill', '#FFFFFF')
      .attr('fill-opacity', 0.95)
      .attr('fill-rule', 'evenodd')
      .attr('transform', 'scale(' + iconScale + ') translate(-24,-24)');
  } else {
    el.append('circle')
      .attr('r', d.r)
      .attr('fill', d.color)
      .attr('fill-opacity', 1)
      .attr('stroke', d.color)
      .attr('stroke-width', 1.5)
      .attr('stroke-opacity', 0.4);
  }
});

// Labels
nodeEls.append('text')
  .text(function(d) {
    var lbl = d.label;
    if (d.type === 'organ') return lbl;
    if (lbl.length > 16) return lbl.substring(0, 14) + '..';
    return lbl;
  })
  .attr('text-anchor', 'middle')
  .attr('dy', function(d) {
    if (d.type === 'organ') return d.r + 16;
    return d.r + 14;
  })
  .attr('font-size', function(d) { return d.type === 'organ' ? '12px' : '10px'; })
  .attr('font-weight', function(d) { return d.type === 'organ' ? '600' : '400'; })
  .attr('fill', function(d) { return d.type === 'organ' ? '#E8E8E8' : '#8899AA'; })
  .attr('pointer-events', 'none');

// =========================================================
// FORCE SIMULATION
// =========================================================
var simulation = d3.forceSimulation(nodes)
  .force('center', d3.forceCenter(0, 0))
  .force('charge', d3.forceManyBody().strength(function(d) {
    if (d.type === 'organ') return -400;
    if (d.type === 'disease') return -80;
    return -120;
  }).distanceMax(600))
  .force('link', d3.forceLink(links).id(function(d) { return d.id; }).distance(function(d) {
    if (d.type === 'organ_produces_lab') return 80;
    if (d.type === 'lab_indicates_disease') return 60;
    return 100;
  }).strength(0.3))
  .force('collide', d3.forceCollide().radius(function(d) { return d.r + 4; }).strength(0.6).iterations(1))
  .alpha(1)
  .alphaDecay(0.025)
  .velocityDecay(0.4)
  .on('tick', ticked)
  .on('end', function() { fitGraph(); });

function ticked() {
  linkEls
    .attr('x1', function(d) { return d.source.x; })
    .attr('y1', function(d) { return d.source.y; })
    .attr('x2', function(d) {
      var dx = d.target.x - d.source.x;
      var dy = d.target.y - d.source.y;
      var dist = Math.sqrt(dx * dx + dy * dy) || 1;
      var tr = (nodeMap[d.target.id] || {r: 16}).r + 4;
      return d.target.x - (dx / dist) * tr;
    })
    .attr('y2', function(d) {
      var dx = d.target.x - d.source.x;
      var dy = d.target.y - d.source.y;
      var dist = Math.sqrt(dx * dx + dy * dy) || 1;
      var tr = (nodeMap[d.target.id] || {r: 16}).r + 4;
      return d.target.y - (dy / dist) * tr;
    });

  nodeEls.attr('transform', function(d) { return 'translate(' + Math.round(d.x) + ',' + Math.round(d.y) + ')'; });
}

// =========================================================
// DRAG
// =========================================================
var drag = d3.drag()
  .on('start', function(event, d) {
    if (!event.active) simulation.alphaTarget(0.3).restart();
    d.fx = d.x;
    d.fy = d.y;
  })
  .on('drag', function(event, d) {
    d.fx = event.x;
    d.fy = event.y;
  })
  .on('end', function(event, d) {
    if (!event.active) simulation.alphaTarget(0);
    d.fx = null;
    d.fy = null;
  });

nodeEls.call(drag);

// =========================================================
// TOOLTIP
// =========================================================
var tooltip = document.getElementById('tooltip');

nodeEls.on('mouseover', function(event, d) {
  tooltip.style.display = 'block';
  var html = '<strong>' + d.label + '</strong>';
  if (d.type === 'labvalue') html += '<br>' + d.category + ' | Norm: ' + d.normalRange + ' ' + d.unit;
  if (d.type === 'disease') html += '<br>' + d.category + ' | ' + d.severity + ' | ICD: ' + d.icd10;
  if (d.type === 'organ') html += '<br>' + d.system;
  tooltip.innerHTML = html;

  linkEls.attr('stroke-opacity', function(l) {
    var sid = typeof l.source === 'object' ? l.source.id : l.source;
    var tid = typeof l.target === 'object' ? l.target.id : l.target;
    return (sid === d.id || tid === d.id) ? 0.8 : 0.08;
  }).attr('stroke-width', function(l) {
    var sid = typeof l.source === 'object' ? l.source.id : l.source;
    var tid = typeof l.target === 'object' ? l.target.id : l.target;
    return (sid === d.id || tid === d.id) ? 2.5 : 1;
  });

  var neighbors = adjacency[d.id];
  nodeEls.attr('opacity', function(n) {
    return (n.id === d.id || neighbors.has(n.id)) ? 1 : 0.15;
  });
})
.on('mousemove', function(event) {
  tooltip.style.left = (event.pageX + 14) + 'px';
  tooltip.style.top = (event.pageY - 10) + 'px';
})
.on('mouseout', function() {
  tooltip.style.display = 'none';
  linkEls.attr('stroke-opacity', 0.5).attr('stroke-width', 1.2);
  nodeEls.attr('opacity', 1);
});

// =========================================================
// CLICK -> INFO PANEL
// =========================================================
var selectedNode = null;

nodeEls.on('click', function(event, d) {
  event.stopPropagation();
  selectedNode = d;
  showInfoPanel(d);
});

svg.on('click', function() {
  closeInfoPanel();
  linkEls.attr('stroke-opacity', 0.5).attr('stroke-width', 1.2);
  nodeEls.attr('opacity', 1);
  selectedNode = null;
});

function showInfoPanel(d) {
  var panel = document.getElementById('info-panel');
  var title = document.getElementById('info-title');
  var typeLabel = document.getElementById('info-type-label');
  var body = document.getElementById('info-body');

  title.textContent = d.label;

  var typeColors = {organ: '#E63946', labvalue: '#028090', disease: '#FFB400'};
  var typeNames = {organ: 'Organ', labvalue: 'Laborwert', disease: 'Erkrankung'};
  typeLabel.textContent = typeNames[d.type] || d.type;
  typeLabel.style.color = typeColors[d.type] || '#AAA';

  var html = '';

  if (d.type === 'organ') {
    html += '<div class="info-section"><div class="info-section-title">System</div>' + d.system + '</div>';
    html += '<div class="info-section"><div class="info-section-title">Beschreibung</div>' + d.description + '</div>';
  } else if (d.type === 'labvalue') {
    html += '<div class="info-section"><div class="info-section-title">Kategorie</div>' + d.category + '</div>';
    html += '<div class="info-section"><div class="info-section-title">Normbereich</div>' + d.normalRange + ' ' + d.unit + '</div>';
    html += '<div class="info-section"><div class="info-section-title">Bedeutung</div>' + d.significance + '</div>';
  } else if (d.type === 'disease') {
    html += '<div class="info-section"><div class="info-section-title">Kategorie</div>' + d.category + '</div>';
    html += '<div class="info-section"><div class="info-section-title">Schweregrad</div>' + d.severity + '</div>';
    html += '<div class="info-section"><div class="info-section-title">ICD-10</div>' + d.icd10 + '</div>';
  }

  var neighbors = adjacency[d.id];
  if (neighbors.size > 0) {
    var connected = Array.from(neighbors).map(function(nid) {
      var n = nodeMap[nid];
      return n ? '<span class="info-tag" style="border-color:' + n.color + '40;color:' + n.color + '">' + n.label + '</span>' : '';
    }).join('');
    html += '<div class="info-section"><div class="info-section-title">Verbunden mit (' + neighbors.size + ')</div><div class="info-connected">' + connected + '</div></div>';
  }

  body.innerHTML = html;
  panel.style.display = 'block';
}

// =========================================================
// SEARCH
// =========================================================
var searchInput = document.getElementById('search-input');
searchInput.addEventListener('input', function() {
  var query = this.value.toLowerCase().trim();
  if (!query) {
    nodeEls.attr('opacity', 1);
    linkEls.attr('stroke-opacity', 0.5);
    return;
  }

  var matchIds = new Set();
  nodes.forEach(function(n) {
    var searchable = (n.label + ' ' + (n.category || '') + ' ' + (n.system || '') + ' ' + (n.icd10 || '')).toLowerCase();
    if (searchable.indexOf(query) !== -1) matchIds.add(n.id);
  });

  var expandedIds = new Set(matchIds);
  matchIds.forEach(function(mid) {
    adjacency[mid].forEach(function(nid) { expandedIds.add(nid); });
  });

  nodeEls.attr('opacity', function(n) {
    if (matchIds.has(n.id)) return 1;
    if (expandedIds.has(n.id)) return 0.5;
    return 0.08;
  });

  linkEls.attr('stroke-opacity', function(l) {
    var sid = typeof l.source === 'object' ? l.source.id : l.source;
    var tid = typeof l.target === 'object' ? l.target.id : l.target;
    if (matchIds.has(sid) || matchIds.has(tid)) return 0.6;
    return 0.03;
  });
});

// =========================================================
// DONE
// =========================================================
console.log('Juvantis Health Graph loaded: ' + nodes.length + ' nodes, ' + links.length + ' edges');

} catch(err) {
  var el = document.getElementById('error-log');
  el.style.display = 'block';
  el.textContent = 'Init error: ' + err.message + ' (stack: ' + (err.stack || '').substring(0, 200) + ')';
  console.error(err);
}
}); // end DOMContentLoaded
</script>

<script>
function closeInfoPanel() {
  document.getElementById('info-panel').style.display = 'none';
}
</script>

</body>
</html>
